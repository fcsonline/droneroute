<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#0f172a"/>
  
  <!-- Route path (dashed curve) -->
  <path d="M140 360 Q120 280 200 240 Q280 200 300 280 Q320 360 380 320" 
        stroke="#3b82f6" stroke-width="8" stroke-dasharray="16 8" fill="none" stroke-linecap="round"/>
  
  <!-- Waypoint dots on the path -->
  <circle cx="140" cy="360" r="14" fill="#3b82f6" stroke="#93c5fd" stroke-width="3"/>
  <circle cx="200" cy="240" r="14" fill="#3b82f6" stroke="#93c5fd" stroke-width="3"/>
  <circle cx="300" cy="280" r="14" fill="#3b82f6" stroke="#93c5fd" stroke-width="3"/>
  <circle cx="380" cy="320" r="14" fill="#3b82f6" stroke="#93c5fd" stroke-width="3"/>
  
  <!-- Waypoint numbers -->
  <text x="140" y="365" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="Arial">1</text>
  <text x="200" y="245" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="Arial">2</text>
  <text x="300" y="285" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="Arial">3</text>
  <text x="380" y="325" text-anchor="middle" fill="white" font-size="16" font-weight="bold" font-family="Arial">4</text>
  
  <!-- Drone body -->
  <g transform="translate(256, 140)">
    <!-- Drone center body -->
    <rect x="-18" y="-10" width="36" height="20" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
    <!-- Camera lens -->
    <circle cx="0" cy="0" r="6" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5"/>
    <!-- Arms -->
    <line x1="-16" y1="-6" x2="-44" y2="-28" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <line x1="16" y1="-6" x2="44" y2="-28" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <line x1="-16" y1="6" x2="-44" y2="28" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <line x1="16" y1="6" x2="44" y2="28" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <!-- Propellers -->
    <ellipse cx="-44" cy="-28" rx="22" ry="6" fill="#3b82f6" opacity="0.5"/>
    <ellipse cx="44" cy="-28" rx="22" ry="6" fill="#3b82f6" opacity="0.5"/>
    <ellipse cx="-44" cy="28" rx="22" ry="6" fill="#3b82f6" opacity="0.5"/>
    <ellipse cx="44" cy="28" rx="22" ry="6" fill="#3b82f6" opacity="0.5"/>
    <!-- Motor hubs -->
    <circle cx="-44" cy="-28" r="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="44" cy="-28" r="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="-44" cy="28" r="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="44" cy="28" r="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  </g>
  
  <!-- Map pin / POI marker -->
  <g transform="translate(400, 180)">
    <path d="M0-30 C-16-30 -28-18 -28-4 C-28 12 0 36 0 36 C0 36 28 12 28-4 C28-18 16-30 0-30Z" 
          fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <circle cx="0" cy="-6" r="9" fill="#fbbf24"/>
  </g>
</svg>
