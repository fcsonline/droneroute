name: Fix Dependabot lockfile

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fix-lockfile:
    name: Regenerate lockfile
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      # Use REPO_PAT so the push creates a real commit that re-triggers
      # pull_request workflows (GITHUB_TOKEN pushes are ignored by design).
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.REPO_PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Regenerate lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Check for lockfile changes
        id: diff
        run: |
          if git diff --quiet package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Lockfile is already in sync — nothing to do"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Lockfile has changes — will push"
          fi

      - name: Push updated lockfile
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: regenerate lockfile with Node $(node -v) / npm $(npm -v)"
          git push
